name: bookbeam
description: BookBeam - Your friendly AI reading companion and vocabulary guide

publish_to: 'none'

platforms:
  android:

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.0
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Networking
  dio: ^5.4.0
  # Environment variables
  flutter_dotenv: ^5.1.0
  
  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  
  # AI
  llama_cpp_dart: ^0.2.2
  path_provider: ^2.1.2
  archive: ^4.0.9

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  custom_lint: ^0.5.7
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - .env

